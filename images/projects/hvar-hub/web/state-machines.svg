<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#0f1220"/>
    </linearGradient>
    <filter id="smGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="18" font-weight="800">FOUR STATE MACHINES — ONE ORGANISM</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Every transition is atomic. Every state touches three inventory dimensions.</text>

  <!-- ─────── REPLACEMENT (R) ─────── -->
  <g transform="translate(40, 110)">
    <rect width="260" height="340" rx="14" fill="#0f1220" stroke="#FF5A36" stroke-width="1" opacity="0.9"/>
    <rect x="0" y="0" width="260" height="36" rx="14" fill="#FF5A36" opacity="0.1"/>
    <text x="130" y="24" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="13" font-weight="700">⇄ Replacement (R)</text>

    <!-- States -->
    <g transform="translate(30, 60)">
      <rect width="200" height="28" rx="6" fill="#FF5A36" opacity="0.08" stroke="#FF5A36" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PENDING</text>
    </g>
    <line x1="130" y1="88" x2="130" y2="100" stroke="#FF5A36" stroke-width="1" opacity="0.5"/>
    <polygon points="126,98 130,104 134,98" fill="#FF5A36" opacity="0.5"/>

    <g transform="translate(30, 104)">
      <rect width="200" height="28" rx="6" fill="#FF5A36" opacity="0.15" stroke="#FF5A36" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="10" font-weight="600">CONFIRMED</text>
      <text x="190" y="18" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">→ reserve</text>
    </g>
    <line x1="130" y1="132" x2="130" y2="144" stroke="#FF5A36" stroke-width="1" opacity="0.5"/>
    <polygon points="126,142 130,148 134,142" fill="#FF5A36" opacity="0.5"/>

    <g transform="translate(30, 148)">
      <rect width="200" height="28" rx="6" fill="#FF5A36" opacity="0.2" stroke="#FF5A36" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="10" font-weight="600">IN_PROCESS</text>
    </g>
    <line x1="130" y1="176" x2="130" y2="188" stroke="#FF5A36" stroke-width="1" opacity="0.5"/>
    <polygon points="126,186 130,192 134,186" fill="#FF5A36" opacity="0.5"/>

    <g transform="translate(30, 192)">
      <rect width="200" height="28" rx="6" fill="#FF5A36" opacity="0.25" stroke="#FF5A36" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="10" font-weight="600">READY_FOR_DISPATCH</text>
    </g>
    <line x1="130" y1="220" x2="130" y2="232" stroke="#FF5A36" stroke-width="1" opacity="0.5"/>
    <polygon points="126,230 130,236 134,230" fill="#FF5A36" opacity="0.5"/>

    <g transform="translate(30, 236)">
      <rect width="200" height="28" rx="6" fill="#FF5A36" opacity="0.3" stroke="#FF5A36" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="10" font-weight="600">SENT</text>
      <text x="190" y="18" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">→ commit</text>
    </g>
    <line x1="130" y1="264" x2="130" y2="276" stroke="#FF5A36" stroke-width="1" opacity="0.5"/>
    <polygon points="126,274 130,280 134,274" fill="#FF5A36" opacity="0.5"/>

    <g transform="translate(30, 280)">
      <rect width="200" height="28" rx="6" fill="#FF5A36" opacity="0.35" stroke="#FF5A36" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="10" font-weight="600">RETURNED</text>
    </g>
    <line x1="130" y1="308" x2="130" y2="316" stroke="#FF5A36" stroke-width="1" opacity="0.5"/>
    <text x="130" y="330" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">→ validate items → COMPLETED</text>
  </g>

  <!-- ─────── MAINTENANCE (M) ─────── -->
  <g transform="translate(320, 110)">
    <rect width="260" height="340" rx="14" fill="#0f1220" stroke="#FBBF24" stroke-width="1" opacity="0.9"/>
    <rect x="0" y="0" width="260" height="36" rx="14" fill="#FBBF24" opacity="0.1"/>
    <text x="130" y="24" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="13" font-weight="700">🔧 Maintenance (M)</text>

    <g transform="translate(30, 60)">
      <rect width="200" height="28" rx="6" fill="#FBBF24" opacity="0.08" stroke="#FBBF24" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PENDING</text>
    </g>
    <line x1="130" y1="88" x2="130" y2="100" stroke="#FBBF24" stroke-width="1" opacity="0.5"/>
    <polygon points="126,98 130,104 134,98" fill="#FBBF24" opacity="0.5"/>

    <g transform="translate(30, 104)">
      <rect width="200" height="28" rx="6" fill="#FBBF24" opacity="0.15" stroke="#FBBF24" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10" font-weight="600">CONFIRMED</text>
    </g>
    <line x1="130" y1="132" x2="130" y2="144" stroke="#FBBF24" stroke-width="1" opacity="0.5"/>
    <polygon points="126,142 130,148 134,142" fill="#FBBF24" opacity="0.5"/>

    <g transform="translate(30, 148)">
      <rect width="200" height="60" rx="6" fill="#FBBF24" opacity="0.2" stroke="#FBBF24" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10" font-weight="600">IN_PROCESS</text>
      <text x="100" y="35" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">بدأت → اكتملت → جاهز</text>
      <text x="100" y="50" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">(3 internal sub-states)</text>
    </g>
    <line x1="130" y1="208" x2="130" y2="220" stroke="#FBBF24" stroke-width="1" opacity="0.5"/>
    <polygon points="126,218 130,224 134,218" fill="#FBBF24" opacity="0.5"/>

    <g transform="translate(30, 224)">
      <rect width="200" height="28" rx="6" fill="#FBBF24" opacity="0.25" stroke="#FBBF24" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10" font-weight="600">READY_FOR_DISPATCH</text>
    </g>
    <line x1="130" y1="252" x2="130" y2="264" stroke="#FBBF24" stroke-width="1" opacity="0.5"/>
    <polygon points="126,262 130,268 134,262" fill="#FBBF24" opacity="0.5"/>

    <g transform="translate(30, 268)">
      <rect width="200" height="28" rx="6" fill="#FBBF24" opacity="0.3" stroke="#FBBF24" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="10" font-weight="600">SENT</text>
    </g>
    <line x1="130" y1="296" x2="130" y2="308" stroke="#FBBF24" stroke-width="1" opacity="0.5"/>
    <text x="130" y="330" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">→ mark delivered → COMPLETED</text>
  </g>

  <!-- ─────── RETURN (T) ─────── -->
  <g transform="translate(600, 110)">
    <rect width="260" height="340" rx="14" fill="#0f1220" stroke="#06B6D4" stroke-width="1" opacity="0.9"/>
    <rect x="0" y="0" width="260" height="36" rx="14" fill="#06B6D4" opacity="0.1"/>
    <text x="130" y="24" text-anchor="middle" fill="#22D3EE" font-family="system-ui, sans-serif" font-size="13" font-weight="700">↩ Return (T)</text>

    <g transform="translate(30, 60)">
      <rect width="200" height="28" rx="6" fill="#06B6D4" opacity="0.08" stroke="#06B6D4" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#22D3EE" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PENDING</text>
    </g>
    <line x1="130" y1="88" x2="130" y2="100" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
    <polygon points="126,98 130,104 134,98" fill="#06B6D4" opacity="0.5"/>

    <g transform="translate(30, 104)">
      <rect width="200" height="28" rx="6" fill="#06B6D4" opacity="0.15" stroke="#06B6D4" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#22D3EE" font-family="system-ui, sans-serif" font-size="10" font-weight="600">CONFIRMED</text>
    </g>
    <line x1="130" y1="132" x2="130" y2="144" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
    <polygon points="126,142 130,148 134,142" fill="#06B6D4" opacity="0.5"/>

    <g transform="translate(30, 148)">
      <rect width="200" height="28" rx="6" fill="#06B6D4" opacity="0.2" stroke="#06B6D4" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#22D3EE" font-family="system-ui, sans-serif" font-size="10" font-weight="600">IN_PROCESS</text>
      <text x="190" y="18" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">→ receive</text>
    </g>
    <line x1="130" y1="176" x2="130" y2="188" stroke="#06B6D4" stroke-width="1" opacity="0.5"/>
    <text x="130" y="210" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">→ validate items → COMPLETED</text>

    <!-- Spacer visual - the short path IS the point -->
    <g transform="translate(30, 240)">
      <rect width="200" height="60" rx="8" fill="#06B6D4" opacity="0.05" stroke="#06B6D4" stroke-width="0.3" stroke-dasharray="4 2"/>
      <text x="100" y="25" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9" font-style="italic">Shortest path.</text>
      <text x="100" y="42" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9" font-style="italic">3 transitions. Clean.</text>
    </g>
  </g>

  <!-- ─────── SELL (S) ─────── -->
  <g transform="translate(880, 110)">
    <rect width="260" height="340" rx="14" fill="#0f1220" stroke="#6366F1" stroke-width="1" opacity="0.9"/>
    <rect x="0" y="0" width="260" height="36" rx="14" fill="#6366F1" opacity="0.1"/>
    <text x="130" y="24" text-anchor="middle" fill="#818CF8" font-family="system-ui, sans-serif" font-size="13" font-weight="700">💰 Sell (S)</text>

    <g transform="translate(30, 60)">
      <rect width="200" height="28" rx="6" fill="#6366F1" opacity="0.08" stroke="#6366F1" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#818CF8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PENDING</text>
    </g>
    <line x1="130" y1="88" x2="130" y2="100" stroke="#6366F1" stroke-width="1" opacity="0.5"/>
    <polygon points="126,98 130,104 134,98" fill="#6366F1" opacity="0.5"/>

    <g transform="translate(30, 104)">
      <rect width="200" height="28" rx="6" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#818CF8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">CONFIRMED</text>
      <text x="195" y="18" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">→ parts</text>
    </g>
    <line x1="130" y1="132" x2="130" y2="144" stroke="#6366F1" stroke-width="1" opacity="0.5"/>
    <polygon points="126,142 130,148 134,142" fill="#6366F1" opacity="0.5"/>

    <g transform="translate(30, 148)">
      <rect width="200" height="28" rx="6" fill="#6366F1" opacity="0.2" stroke="#6366F1" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#818CF8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">IN_PROCESS</text>
    </g>
    <line x1="130" y1="176" x2="130" y2="188" stroke="#6366F1" stroke-width="1" opacity="0.5"/>
    <polygon points="126,186 130,192 134,186" fill="#6366F1" opacity="0.5"/>

    <g transform="translate(30, 192)">
      <rect width="200" height="28" rx="6" fill="#6366F1" opacity="0.25" stroke="#6366F1" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#818CF8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">READY_FOR_DISPATCH</text>
    </g>
    <line x1="130" y1="220" x2="130" y2="232" stroke="#6366F1" stroke-width="1" opacity="0.5"/>
    <polygon points="126,230 130,236 134,230" fill="#6366F1" opacity="0.5"/>

    <g transform="translate(30, 236)">
      <rect width="200" height="28" rx="6" fill="#6366F1" opacity="0.3" stroke="#6366F1" stroke-width="0.5"/>
      <text x="100" y="18" text-anchor="middle" fill="#818CF8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">SENT</text>
      <text x="190" y="18" fill="#64748B" font-family="system-ui, sans-serif" font-size="8">→ commit</text>
    </g>
    <line x1="130" y1="264" x2="130" y2="276" stroke="#6366F1" stroke-width="1" opacity="0.5"/>
    <text x="130" y="330" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">→ confirm sent → COMPLETED</text>

    <!-- Note -->
    <g transform="translate(30, 280)">
      <text x="100" y="10" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="8" font-style="italic">Products = reference only</text>
      <text x="100" y="22" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="8" font-style="italic">Parts only get reserved</text>
    </g>
  </g>

  <!-- ─────── BOTTOM INVENTORY BAR ─────── -->
  <rect x="40" y="490" width="1120" height="120" rx="14" fill="#0f1220" stroke="#1E293B" stroke-width="1"/>
  <text x="600" y="520" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12" font-weight="700">INVENTORY LIFECYCLE — Every Transition Is Atomic</text>

  <!-- Reserve -->
  <g transform="translate(100, 545)">
    <rect width="180" height="44" rx="8" fill="#FF5A36" opacity="0.08" stroke="#FF5A36" stroke-width="0.8"/>
    <text x="90" y="18" text-anchor="middle" fill="#FF7A5A" font-family="system-ui, sans-serif" font-size="11" font-weight="700">RESERVE</text>
    <text x="90" y="34" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">reserved ↑ on_hand unchanged</text>
  </g>
  <line x1="280" y1="567" x2="340" y2="567" stroke="#475569" stroke-width="1"/>
  <polygon points="336,563 344,567 336,571" fill="#475569"/>

  <!-- Commit -->
  <g transform="translate(345, 545)">
    <rect width="180" height="44" rx="8" fill="#FBBF24" opacity="0.08" stroke="#FBBF24" stroke-width="0.8"/>
    <text x="90" y="18" text-anchor="middle" fill="#FCD34D" font-family="system-ui, sans-serif" font-size="11" font-weight="700">COMMIT</text>
    <text x="90" y="34" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">reserved ↓ on_hand ↓</text>
  </g>
  <line x1="525" y1="567" x2="585" y2="567" stroke="#475569" stroke-width="1"/>
  <polygon points="581,563 589,567 581,571" fill="#475569"/>

  <!-- Receive -->
  <g transform="translate(590, 545)">
    <rect width="180" height="44" rx="8" fill="#06B6D4" opacity="0.08" stroke="#06B6D4" stroke-width="0.8"/>
    <text x="90" y="18" text-anchor="middle" fill="#22D3EE" font-family="system-ui, sans-serif" font-size="11" font-weight="700">RECEIVE</text>
    <text x="90" y="34" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">on_hand ↑ OR damaged ↑</text>
  </g>
  <line x1="770" y1="567" x2="830" y2="567" stroke="#475569" stroke-width="1"/>
  <polygon points="826,563 834,567 826,571" fill="#475569"/>

  <!-- Cancel -->
  <g transform="translate(835, 545)">
    <rect width="180" height="44" rx="8" fill="#6366F1" opacity="0.08" stroke="#6366F1" stroke-width="0.8"/>
    <text x="90" y="18" text-anchor="middle" fill="#818CF8" font-family="system-ui, sans-serif" font-size="11" font-weight="700">CANCEL</text>
    <text x="90" y="34" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">reserved ↓ on_hand unchanged</text>
  </g>

  <!-- Footer -->
  <text x="600" y="640" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">All operations execute inside MySQL transactions. One broken link → entire chain corrupted. Zero tolerance for inconsistency.</text>

  <!-- Corner accents -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#FF5A36" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#FF5A36" stroke-width="1" opacity="0.3"/>
  <circle cx="20" cy="20" r="2" fill="#FF5A36" opacity="0.5"/>
  <line x1="1180" y1="20" x2="1140" y2="20" stroke="#FF5A36" stroke-width="1" opacity="0.3"/>
  <line x1="1180" y1="20" x2="1180" y2="60" stroke="#FF5A36" stroke-width="1" opacity="0.3"/>
  <circle cx="1180" cy="20" r="2" fill="#FF5A36" opacity="0.5"/>
  <line x1="20" y1="780" x2="60" y2="780" stroke="#FF5A36" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="780" x2="20" y2="740" stroke="#FF5A36" stroke-width="1" opacity="0.3"/>
  <circle cx="20" cy="780" r="2" fill="#FF5A36" opacity="0.5"/>
  <line x1="1180" y1="780" x2="1140" y2="780" stroke="#FF5A36" stroke-width="1" opacity="0.3"/>
  <line x1="1180" y1="780" x2="1180" y2="740" stroke="#FF5A36" stroke-width="1" opacity="0.3"/>
  <circle cx="1180" cy="780" r="2" fill="#FF5A36" opacity="0.5"/>
</svg>
